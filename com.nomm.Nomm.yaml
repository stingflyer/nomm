id: com.nomm.Nomm
runtime: org.gnome.Platform
runtime-version: '49' # Matching the latest stable GNOME runtime
sdk: org.gnome.Sdk
command: nomm # The name of your entry-point script
finish-args:
  # Network access for downloading images and Nexus mods
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --own-name=com.nomm.Nomm
  # Heroic
  - --filesystem=~/.config/heroic:ro # Standard
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl/config/heroic:ro # Flatpak
  # Steam
  - --filesystem=~/.local/share/Steam:ro # Standard
  - --filesystem=~/.var/app/com.valvesoftware.Steam:ro # Flatpak
  # Mounting points (to install mods in games)
  - --filesystem=/run/media:rw
  - --filesystem=/mnt:rw

modules:
  # 1. Python dependencies (generated via flatpak-pip-generator)
  - python3-modules.json

  # bundling unrar because otherwise the default version in flatpak doesn't work
  - name: unrar
    buildsystem: simple
    build-commands:
      - make -f makefile
      - install -Dm755 unrar /app/bin/unrar
    sources:
      - type: archive
        url: https://www.rarlab.com/rar/unrarsrc-6.2.10.tar.gz
        sha256: 55fe6ebd5e48d6655bfda3fd19b55438ca05e13c7e69772420caad9fdb68ef42
        
  # 2. Your Application
  - name: nomm
    buildsystem: simple

    build-commands:
      # Install entry point from the src folder to /app/bin
      - install -D src/launcher.py /app/bin/nomm
      
      # Install desktop file
      - install -D com.nomm.Nomm.desktop /app/share/applications/com.nomm.Nomm.desktop

      # Install metainfo
      - install -D com.nomm.Nomm.metainfo.xml /app/share/metainfo/com.nomm.Nomm.metainfo.xml

      # Install icon
      - install -D assets/nomm.png /app/share/icons/hicolor/64x64/apps/com.nomm.Nomm.png

      # Copy all other python files FROM src into the same /app/bin folder
      # This ensures 'nomm' and 'dashboard.py' are flat neighbors
      - cp src/*.py /app/bin/
      - cp src/*.yaml /app/bin/
      - cp src/*.css /app/bin/
      
      # Copy non-code folders
      - cp -r assets /app/bin/assets
      - cp -r default_game_configs /app/bin/default_game_configs

      # Localisation
      - mkdir -p /app/share/locale/fr/LC_MESSAGES
      - msgfmt locale/fr.po -o /app/share/locale/fr/LC_MESSAGES/com.nomm.Nomm.mo

    sources:
      - type: dir
        path: .